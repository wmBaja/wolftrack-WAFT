[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Library Dependencies - Install from GitHub
lib_deps = 
    https://github.com/sparkfun/SparkFun_ADS122C04_ADC_Arduino_Library.git
    
; Build flags (optional optimizations)
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_ARDUHAL_LOG_DEFAULT_LEVEL=0